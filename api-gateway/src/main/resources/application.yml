server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedHeaders: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowCredentials: true
      routes:
        # ─── Auth Service ──────────────────────────────────────────
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**

        # ─── Profile Service ──────────────────────────────────────
        - id: profile-service
          uri: http://profile-service:8082
          predicates:
            - Path=/profiles/**

        # ─── Appointment Service ──────────────────────────────────
        - id: appointment-service
          uri: http://appointment-service:8083
          predicates:
            - Path=/appointments/**

        # ─── Consultation Service ─────────────────────────────────
        - id: consultation-service
          uri: http://consultation-service:8084
          predicates:
            - Path=/consult/**

        # ─── Records Service ─────────────────────────────────────
        - id: records-service
          uri: http://records-service:8085
          predicates:
            - Path=/records/**

        # ─── Records Service (Visits) ────────────────────────────
        - id: records-visits
          uri: http://records-service:8085
          predicates:
            - Path=/visits/**

        # ─── Records Service (Patient Records) ──────────────────
        - id: records-patient
          uri: http://records-service:8085
          predicates:
            - Path=/patients/{patientId}/records/**

        # ─── Profile Service (Doctors) ──────────────────────────
        - id: profile-doctors
          uri: http://profile-service:8082
          predicates:
            - Path=/doctors/**

        # ─── Pharmacy Service (Inventory) ────────────────────────
        - id: pharmacy-inventory
          uri: http://pharmacy-service:8086
          predicates:
            - Path=/inventory/**

        # ─── Pharmacy Service (Prescriptions) ────────────────────
        - id: pharmacy-prescriptions
          uri: http://pharmacy-service:8086
          predicates:
            - Path=/prescriptions/**/fulfill,/prescriptions/**/status

        # ─── Records Service (Prescriptions) ─────────────────────
        - id: records-prescriptions
          uri: http://records-service:8085
          predicates:
            - Path=/prescriptions, /prescriptions/**

        # ─── Content Service (Posts) ─────────────────────────────
        - id: content-posts
          uri: http://content-service:8087
          predicates:
            - Path=/posts/**

        # ─── Content Service (Questions) ─────────────────────────
        - id: content-questions
          uri: http://content-service:8087
          predicates:
            - Path=/questions/**

jwt:
  secret: caresphere-auth-service-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256

logging:
  level:
    root: INFO
    com.caresphere.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
